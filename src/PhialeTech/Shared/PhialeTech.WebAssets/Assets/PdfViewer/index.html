<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="x-ua-compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhialeTech PdfViewer</title>
  <link rel="stylesheet" href="./web/pdf_viewer.css" />
  <style>
    :root {
      color-scheme: light;
      --pt-surface: #e2e8f0;
      --pt-page-gap: 16px;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--pt-surface);
      color: var(--pt-text);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: 1fr;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #e2e8f0, #dbe4ef);
    }

    #viewerContainer {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 16px;
      box-sizing: border-box;
      outline: none;
      scrollbar-color: rgba(148, 163, 184, 0.38) transparent;
    }

    #viewer {
      min-height: 100%;
    }

    .pdfViewer .page {
      border-radius: 6px;
      margin: 0 auto var(--pt-page-gap);
      box-shadow:
        0 12px 32px rgba(15, 23, 42, 0.16),
        0 0 0 1px rgba(148, 163, 184, 0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewerContainer" tabindex="0">
      <div id="viewer" class="pdfViewer"></div>
    </div>
  </div>

  <script type="module" src="./phiale-pdf-host.js"></script>
</body>
</html>
