namespace: application.forms
imports:
  - domain.person
  - application.forms.actionShells

document:
  id: yaml-generated-form
  kind: Form
  extends: review-sticky-header-footer
  name: YAML generated form
  interactionMode: Classic
  densityMode: Normal
  fieldChromeMode: Framed
  bottomRegionChrome: Merged
  header:
    title: YAML generated form
    subtitle: Example document
    description: This sample shows the base document structure with header, content, footer, and footer actions.
    status: Ready
    context: Demo
  footer:
    note: Fields marked with * are required.
    status: Changes are not saved automatically.
    source: application.forms.generated-form
  actionAreas:
    - id: footerPrimary
      placement: Bottom
      horizontalAlignment: Right
      chromeMode: Blended
      shared: true
      sticky: true
  fields:
    - id: firstName
      extends: firstName
    - id: lastName
      extends: lastName
    - id: age
      extends: age
    - id: notes
      extends: documentNotes
    - id: developer.firstName
      extends: firstName
    - id: developer.lastName
      extends: lastName
  layout:
    type: Column
    overlayScope: true
    items:
      - type: Container
        caption: Reviewer
        containerChrome: Framed
        variant: Compact
        items:
          - type: Row
            items:
              - fieldRef: firstName
              - fieldRef: lastName
      - type: Container
        caption: Developer data
        containerChrome: Framed
        containerBehavior: Collapsible
        collapsedText: "{developer.lastName} {developer.firstName}, {age}"
        variant: Compact
        items:
          - type: Row
            items:
              - fieldRef: developer.lastName
              - fieldRef: developer.firstName
              - fieldRef: age
      - type: Container
        caption: Review notes
        containerChrome: None
        items:
          - fieldRef: notes
  actions:
    - id: ok
      semantic: Ok
      captionKey: actions.ok.caption
      iconKey: ok
      area: footerPrimary
    - id: cancel
      semantic: Cancel
      captionKey: actions.cancel.caption
      iconKey: cancel
      area: footerPrimary
