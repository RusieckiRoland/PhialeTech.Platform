namespace: bases

definitions:
  baseText:
    control: YamlTextBox
    valueType: string
    multiline: false

  baseMultilineText:
    extends: baseText
    multiline: true

  baseDocumentEditorText:
    control: YamlDocumentEditor
    widthHint: Fill
    fieldChromeMode: Framed
    captionPlacement: Top
    showLabel: true
    showPlaceholder: true
    value: '{"type":"doc","content":[{"type":"paragraph"}]}'
